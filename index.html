<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Text</title>
<style>
  :root{color-scheme:dark}
  html,body{height:100%;margin:0;font-family:-apple-system,system-ui,sans-serif;background:#0b0b0c;color:#f2f2f2}
  .wrap{min-height:100%;box-sizing:border-box;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;padding:30px 22px}
  a.btn{display:inline-block;background:#0a84ff;color:#fff;text-decoration:none;
    font-size:1.5rem;font-weight:800;padding:18px 30px;border-radius:16px}
  .muted{opacity:.5;font-size:.95rem;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <a class="btn" id="go" href="#">💬 Text</a>
  <div class="muted" id="hint">Opening Messages…</div>
</div>
<script>
/* Instant jump into the iPhone Messages composer for the number in the URL
   FRAGMENT ("#<digits>/<name>"). The fragment never leaves the device — no
   number/name is sent to any server. Trello opens this https page in its
   in-app browser, which then redirects straight to sms:. The button is a
   one-tap fallback only if a webview blocks the auto-redirect. */
(function(){
  var h = (location.hash || "").replace(/^#/, "");
  var slash = h.indexOf("/");
  var rawNum = slash >= 0 ? h.slice(0, slash) : h;
  var rawName = slash >= 0 ? h.slice(slash + 1) : "";
  var d = decodeURIComponent(rawNum).replace(/[^0-9]/g, "");
  var e = "";
  if (d.length === 10) e = "+1" + d;
  else if (d.length === 11 && d.charAt(0) === "1") e = "+" + d;
  var a = document.getElementById("go"), hint = document.getElementById("hint");
  if (!e) { a.textContent = "No number"; a.removeAttribute("href"); hint.textContent = ""; return; }
  var name = "";
  try { name = decodeURIComponent(rawName); } catch (x) { name = rawName; }
  var uri = "sms:" + e;
  a.href = uri;
  a.textContent = "💬 Text " + (name || ("(" + e.slice(2,5) + ") " + e.slice(5,8) + "-" + e.slice(8)));
  hint.textContent = "If Messages didn't open, tap the button.";
  location.href = uri;          // auto-jump straight into Messages
})();
</script>
</body>
</html>
