<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Text this lead</title>
<style>
  html,body{height:100%;margin:0;font-family:-apple-system,system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;background:#111;color:#eee}
  main{text-align:center;padding:24px}
  a.btn{display:inline-block;background:#34c759;color:#fff;text-decoration:none;
    font-size:1.6rem;font-weight:700;padding:18px 28px;border-radius:16px}
  p{opacity:.6;font-size:.95rem;margin-top:18px}
</style>
</head>
<body>
<main>
  <a class="btn" id="go" href="#">💬 Open Messages</a>
  <p id="hint"></p>
</main>
<script>
/* Opens the iPhone Messages composer for the number in the URL FRAGMENT
   (e.g. .../#16026722616). The fragment never leaves the device — it is
   not sent to GitHub or any server, so no phone number appears in any log.
   Auto-attempts the redirect; the big button is the guaranteed fallback. */
(function(){
  var raw = decodeURIComponent((location.hash||"").replace(/^#/,""));
  var digits = raw.replace(/[^0-9]/g,"");
  var e164 = "";
  if (digits.length === 10) e164 = "+1"+digits;
  else if (digits.length === 11 && digits.charAt(0) === "1") e164 = "+"+digits;
  var a = document.getElementById("go"), hint = document.getElementById("hint");
  if (!e164){
    a.textContent = "No number provided";
    a.removeAttribute("href");
    return;
  }
  var pretty = "("+e164.slice(2,5)+") "+e164.slice(5,8)+"-"+e164.slice(8);
  var uri = "sms:"+e164;
  a.href = uri;
  a.textContent = "💬 Text "+pretty;
  hint.textContent = "If Messages didn't open automatically, tap the button.";
  location.href = uri;
})();
</script>
</body>
</html>
